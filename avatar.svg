<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="avBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2340"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="avGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6c66f"/>
      <stop offset="100%" stop-color="#c9a961"/>
    </linearGradient>
    <radialGradient id="avGlow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
    <filter id="avShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#avBg)"/>
  <circle cx="200" cy="200" r="200" fill="url(#avGlow)"/>

  <!-- Outer gold ring -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="url(#avGold)" stroke-width="2.5" opacity="0.85"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#c9a961" stroke-width="0.8" opacity="0.35"/>

  <!-- Inner radial mark -->
  <g opacity="0.4" stroke="#c9a961" stroke-width="0.6">
    <line x1="200" y1="40" x2="200" y2="52"/>
    <line x1="360" y1="200" x2="348" y2="200"/>
    <line x1="200" y1="360" x2="200" y2="348"/>
    <line x1="40" y1="200" x2="52" y2="200"/>
  </g>

  <!-- Monogram -->
  <text x="200" y="240" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="170" fill="url(#avGold)" text-anchor="middle" letter-spacing="-6" filter="url(#avShadow)">PK</text>

  <!-- Small initials below -->
  <text x="200" y="305" font-family="Inter, sans-serif" font-weight="500" font-size="14" letter-spacing="6" fill="#7e8aa3" text-anchor="middle">PARAG KHARE</text>
  <line x1="170" y1="320" x2="230" y2="320" stroke="#c9a961" stroke-width="1"/>
  <text x="200" y="343" font-family="Inter, sans-serif" font-weight="400" font-size="10" letter-spacing="3" fill="#c9a961" text-anchor="middle">MBA · ING.</text>
</svg>
