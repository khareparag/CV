<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111729"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#e6c66f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Gold top border -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#goldAccent)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#c9a961" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Monogram corner -->
  <g transform="translate(70, 60)">
    <rect width="64" height="64" rx="12" fill="#131a2d" stroke="#c9a961" stroke-width="1.5"/>
    <text x="32" y="42" font-family="Inter, sans-serif" font-weight="700" font-size="26" fill="#c9a961" text-anchor="middle">PK</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(160, 80)">
    <text font-family="Inter, sans-serif" font-weight="600" font-size="14" letter-spacing="4" fill="#c9a961">PARAG KHARE  ·  MBA, ING.</text>
    <text y="22" font-family="Inter, sans-serif" font-weight="400" font-size="13" letter-spacing="2" fill="#7e8aa3">FRANKFURT / LANGEN  ·  GERMAN CITIZEN</text>
  </g>

  <!-- Main Title -->
  <text x="70" y="280" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="76" fill="#e8eaf0" letter-spacing="-2">The Double Agent in</text>
  <text x="70" y="360" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="76" fill="url(#goldAccent)" letter-spacing="-2">Pricing, Procurement</text>
  <text x="70" y="440" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="76" fill="url(#goldAccent)" letter-spacing="-2">&amp; Tender Strategy</text>

  <!-- Subline -->
  <text x="70" y="495" font-family="Inter, sans-serif" font-weight="400" font-size="20" fill="#b6bdce">12+ years bridging Seller (Forwarding) and Buyer (Shipper/Platform) perspectives.</text>

  <!-- Metric strip -->
  <g transform="translate(70, 540)">
    <rect width="1060" height="56" rx="10" fill="#131a2d" stroke="#1f2940" stroke-width="1"/>

    <g transform="translate(30, 18)">
      <text font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="26" fill="#c9a961">+15%</text>
      <text y="22" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#7e8aa3">WIN-RATE</text>
    </g>
    <line x1="200" y1="10" x2="200" y2="46" stroke="#1f2940" stroke-width="1"/>

    <g transform="translate(220, 18)">
      <text font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="26" fill="#c9a961">+1.7%</text>
      <text y="22" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#7e8aa3">MARGIN</text>
    </g>
    <line x1="390" y1="10" x2="390" y2="46" stroke="#1f2940" stroke-width="1"/>

    <g transform="translate(410, 18)">
      <text font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="26" fill="#c9a961">$8M+</text>
      <text y="22" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#7e8aa3">DEALS CLOSED</text>
    </g>
    <line x1="580" y1="10" x2="580" y2="46" stroke="#1f2940" stroke-width="1"/>

    <g transform="translate(600, 18)">
      <text font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="26" fill="#c9a961">68+</text>
      <text y="22" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#7e8aa3">SHIPPERS SERVED</text>
    </g>
    <line x1="770" y1="10" x2="770" y2="46" stroke="#1f2940" stroke-width="1"/>

    <g transform="translate(790, 18)">
      <text font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="26" fill="#c9a961">−20%</text>
      <text y="22" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#7e8aa3">MANUAL EFFORT</text>
    </g>
    <line x1="960" y1="10" x2="960" y2="46" stroke="#1f2940" stroke-width="1"/>

    <g transform="translate(980, 18)">
      <text font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="26" fill="#c9a961">12+</text>
      <text y="22" font-family="Inter, sans-serif" font-weight="400" font-size="11" fill="#7e8aa3">YEARS</text>
    </g>
  </g>

  <!-- Gold accent dot in corner -->
  <circle cx="1130" cy="80" r="5" fill="#c9a961"/>
  <circle cx="1130" cy="80" r="10" fill="none" stroke="#c9a961" stroke-width="1" opacity="0.5"/>
</svg>
