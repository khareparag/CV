<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="lbBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="55%" stop-color="#111729"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="lbGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#e6c66f"/>
    </linearGradient>
    <radialGradient id="lbGlow1" cx="0.18" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lbGlow2" cx="0.85" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#lbBg)"/>
  <rect width="1584" height="396" fill="url(#lbGlow1)"/>
  <rect width="1584" height="396" fill="url(#lbGlow2)"/>

  <!-- Gold accent lines -->
  <rect width="1584" height="3" fill="url(#lbGold)"/>
  <rect y="393" width="1584" height="3" fill="url(#lbGold)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#c9a961" stroke-width="1">
    <line x1="0" y1="100" x2="1584" y2="100"/>
    <line x1="0" y1="200" x2="1584" y2="200"/>
    <line x1="0" y1="300" x2="1584" y2="300"/>
  </g>

  <!-- Small monogram in safe-corner (top-left, not covered by profile photo) -->
  <g transform="translate(90, 80)">
    <rect width="56" height="56" rx="11" fill="#131a2d" stroke="#c9a961" stroke-width="1.2"/>
    <text x="28" y="38" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#c9a961" text-anchor="middle">PK</text>
  </g>

  <!-- LEFT: Tagline block -->
  <g transform="translate(370, 110)">
    <text font-family="Inter, sans-serif" font-weight="600" font-size="14" letter-spacing="5" fill="#c9a961">THE DOUBLE AGENT</text>

    <text y="68" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="56" fill="#e8eaf0" letter-spacing="-1.5">Pricing  ·  Procurement</text>
    <text y="128" font-family="'Cormorant Garamond', Georgia, serif" font-weight="600" font-size="56" fill="url(#lbGold)" letter-spacing="-1.5">Tender Strategy</text>

    <text y="172" font-family="Inter, sans-serif" font-weight="400" font-size="17" fill="#b6bdce">12+ years bridging Seller and Buyer perspectives in global logistics</text>
    <text y="210" font-family="Inter, sans-serif" font-weight="500" font-size="13" letter-spacing="2.5" fill="#7e8aa3">FRANKFURT  ·  RHEIN-NECKAR  ·  EMEA  ·  SWITZERLAND</text>
  </g>

  <!-- RIGHT: Metrics card -->
  <g transform="translate(1170, 75)">
    <rect width="340" height="246" rx="14" fill="#131a2d" fill-opacity="0.85" stroke="#1f2940" stroke-width="1"/>

    <text x="22" y="38" font-family="Inter, sans-serif" font-weight="600" font-size="11" letter-spacing="3" fill="#c9a961">MEASURABLE RESULTS</text>
    <line x1="22" y1="50" x2="60" y2="50" stroke="#c9a961" stroke-width="1.5"/>

    <!-- Row 1 -->
    <text x="22" y="100" font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="34" fill="#c9a961">+15%</text>
    <text x="155" y="100" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#b6bdce">Win-rate uplift</text>
    <line x1="22" y1="112" x2="318" y2="112" stroke="#1f2940" stroke-width="1"/>

    <!-- Row 2 -->
    <text x="22" y="148" font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="34" fill="#c9a961">+1.7%</text>
    <text x="155" y="148" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#b6bdce">Margin uplift</text>
    <line x1="22" y1="160" x2="318" y2="160" stroke="#1f2940" stroke-width="1"/>

    <!-- Row 3 -->
    <text x="22" y="196" font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="34" fill="#c9a961">$8M+</text>
    <text x="155" y="196" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#b6bdce">Deals closed</text>
    <line x1="22" y1="208" x2="318" y2="208" stroke="#1f2940" stroke-width="1"/>

    <!-- Row 4 -->
    <text x="22" y="232" font-family="'Cormorant Garamond', Georgia, serif" font-weight="700" font-size="28" fill="#c9a961">68+</text>
    <text x="155" y="232" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#b6bdce">Enterprise shippers</text>
  </g>

  <!-- Decorative gold dots in top-right corner -->
  <g fill="#c9a961" opacity="0.3">
    <circle cx="1530" cy="60" r="3"/>
    <circle cx="1545" cy="50" r="2"/>
    <circle cx="1515" cy="50" r="2"/>
    <circle cx="1540" cy="75" r="1.5"/>
    <circle cx="1520" cy="75" r="1.5"/>
  </g>
</svg>
